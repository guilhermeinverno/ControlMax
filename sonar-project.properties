sonar.projectKey=controlmax
sonar.projectName=ControlMax
sonar.projectVersion=1.0.0

sonar.sources=frontend/src,backend
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js,**/assets/**,**/documentation/**,**/*.cjs,fix_*.js

# TypeScript / JavaScript
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=frontend/tsconfig.sonar.json,backend/tsconfig.json

# Cobertura de testes (Vitest + LCOV)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.tests=frontend/src
sonar.test.inclusions=**/*.test.ts
